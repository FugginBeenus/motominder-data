name: Update motorcycle data

# Runs every Sunday at 06:00 UTC (~Saturday 10pm PT / 1am ET).
# Also runnable manually from the Actions tab via workflow_dispatch.
on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run updater
        run: python scripts/update_motorcycles.py

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain docs/motorcycles.json)" ]]; then
            git add docs/motorcycles.json
            git commit -m "chore: weekly motorcycle data refresh ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No changes to commit."
          fi
